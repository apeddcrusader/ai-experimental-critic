<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="720" height="240" rx="10" fill="#0f172a"/>
  <text x="360" y="30" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">AI Experimental Critic Architecture</text>

  <!-- Input -->
  <rect x="20" y="80" width="100" height="60" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="70" y="105" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="500">Proposal</text>
  <text x="70" y="122" text-anchor="middle" fill="#64748b" font-size="9">JSON input</text>

  <!-- Arrow to rules -->
  <line x1="120" y1="110" x2="155" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Rule engine -->
  <rect x="155" y="45" width="300" height="150" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="305" y="67" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">10 Rule Checkers (parallel)</text>

  <!-- Rule boxes - 2 columns x 5 rows -->
  <rect x="170" y="78" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="235" y="92" text-anchor="middle" fill="#fcd34d" font-size="9">Missing neg. control</text>
  <rect x="170" y="102" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="235" y="116" text-anchor="middle" fill="#fcd34d" font-size="9">Missing pos. control</text>
  <rect x="170" y="126" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="235" y="140" text-anchor="middle" fill="#fcd34d" font-size="9">No randomization</text>
  <rect x="170" y="150" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="235" y="164" text-anchor="middle" fill="#fcd34d" font-size="9">No blinding</text>
  <rect x="170" y="174" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="235" y="188" text-anchor="middle" fill="#fcd34d" font-size="9">Underpowered sample</text>

  <rect x="310" y="78" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="375" y="92" text-anchor="middle" fill="#fcd34d" font-size="9">No replication</text>
  <rect x="310" y="102" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="375" y="116" text-anchor="middle" fill="#fcd34d" font-size="9">No statistical test</text>
  <rect x="310" y="126" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="375" y="140" text-anchor="middle" fill="#fcd34d" font-size="9">Measurement bias</text>
  <rect x="310" y="150" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="375" y="164" text-anchor="middle" fill="#fcd34d" font-size="9">Confounders</text>
  <rect x="310" y="174" width="130" height="20" rx="3" fill="#3b2f1e"/>
  <text x="375" y="188" text-anchor="middle" fill="#fcd34d" font-size="9">No endpoint defined</text>

  <!-- Severity aggregator -->
  <line x1="455" y1="110" x2="490" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="490" y="75" width="100" height="70" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="540" y="98" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Severity</text>
  <text x="540" y="113" text-anchor="middle" fill="#f87171" font-size="9">critical: -0.10</text>
  <text x="540" y="126" text-anchor="middle" fill="#fb923c" font-size="9">warning: -0.05</text>
  <text x="540" y="139" text-anchor="middle" fill="#64748b" font-size="9">info: -0.02</text>

  <!-- Score output -->
  <line x1="590" y1="110" x2="625" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="625" y="75" width="75" height="70" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="662" y="100" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Report</text>
  <text x="662" y="118" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="700">0.75</text>
  <text x="662" y="136" text-anchor="middle" fill="#64748b" font-size="9">/ 1.00</text>

  <text x="360" y="225" text-anchor="middle" fill="#475569" font-size="10">10 independent rules  |  severity-weighted scoring  |  JSON report output</text>
</svg>
